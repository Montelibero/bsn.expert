name: Build and push Docker image

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_APP_NAME: montelibero/bsn_app
  IMAGE_WEB_NAME: montelibero/bsn_web
  OCI_SOURCE: https://github.com/${{ github.repository }}
  OCI_REVISION: ${{ github.sha }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Check Font Awesome subset config
        run: npm ci && npm run fa_test

      - name: Build APP Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: app/Dockerfile
          target: prod
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_APP_NAME }}:latest
          labels: |
            org.opencontainers.image.source=${{ env.OCI_SOURCE }}
            org.opencontainers.image.revision=${{ env.OCI_REVISION }}
          cache-from: type=gha,scope=bsn-app
          cache-to: type=gha,scope=bsn-app,mode=max

      - name: Build WEB Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: web/Dockerfile
          target: prod
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_WEB_NAME }}:latest
          labels: |
            org.opencontainers.image.source=${{ env.OCI_SOURCE }}
            org.opencontainers.image.revision=${{ env.OCI_REVISION }}
          cache-from: type=gha,scope=bsn-web
          cache-to: type=gha,scope=bsn-web,mode=max

      - name: Notify Telegram
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
            -H "Content-Type: application/json" \
            -d '{"chat_id": "-1003339919065", "text": "Docker image pushed to registry /info_bsn_app or /info_bsn_web (@sozidatel!)"}'
          
