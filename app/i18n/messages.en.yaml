tokens:
  description: Tokens-shmojens. We haven't yet figured out what to place on this page.
  categories:
    membership:
      name: Membership Tokens
      description: These tokens are used to record membership in various organizations. They are usually not freely tradable.
    mtl_stables:
      name: Fiat Stablecoins
      description: Tokens whose price is pegged to a government-issued currency.
    mtl_wrapped:
      name: Wrapped Crypto
      description: Tokens similar to stablecoins, but pegged to crypto assets, usually from other blockchains.
    euro_notes:
      name: Euro Notes
      description: Tokens that serve various accounting functions. What they have in common is that they are all denominated in euros.
    bonds:
      name: Bond Tokens
      description: Tokens whose issuers promise holders a fixed return, for example as interest over a specified period.
    shares:
      name: Share Tokens
      description: Tokens recording symbolic or real shares in companies or property, as well as the related rights and obligations of their holders.
    time_tokens:
      name: Time Tokens
      description: Personal tokens denominated in hours and recording the issuer's obligation to provide a service or perform work under general or special terms.
    donation:
      name: Donation Tokens
      description: Tokens purchased as a way to make a donation. The tokens themselves usually remain as souvenirs.
    nft:
      name: NFT Tokens
      description: So-called non-fungible tokens, meaning unique tokens tied to indivisible objects.
    mtl_debt:
      name: Treasury Receipts
      description: Service tokens used to account for and control obligations to custody specific assets.
    rwa:
      name: RWA Tokens
      description: Tokenized "real-world" assets, including commodities and equities, real estate, transport, and other tangible objects.
    other:
      name: Other
      description: Tokens so original that they have not yet found a place in other categories.

