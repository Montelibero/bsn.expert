who_are_you:
  title: Who are you acting as?
  switcher_title: Who are you now?
  intro: >
    This action needs to know which Stellar account you want to act as.
    If you are logged in, we usually use your login account or the current account you selected earlier.
    If you are not logged in, setting the current account here is enough.
  safety: >
    This does not give the site control over your account. We only use the address to show existing links and
    prepare the right transaction; you will review and sign that transaction separately.
  multisig_note: >
    You can use a personal account, an organization account, or a shared multisig account.
