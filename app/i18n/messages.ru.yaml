tokens:
  description: >
    Любой участник токеномики может выпустить какие-нибудь токены. И наполнить их смыслом.
    Ниже представлены разные известные токены, разбитые худо-бедно по категориям.
    Не является инвестиционной рекомендацией :-)
  categories:
    membership:
      name: Токены участия
      description: Эти токены используются для фиксации членства в различных организациях. Обычно у них нет свободного хождения.
    mtl_stables:
      name: Фиатные стейблы
      description: Токены, цена которых привязана к какой-нибудь государственной валюте.
    mtl_wrapped:
      name: Обёрнутая крипта
      description: Токены, аналогичные стейблам, но привязанные к криптоактивам — обычно из других блокчейнов.
    euro_notes:
      name: Расписки на евро
      description: Это токены, реализующие различные учётные функции. Объединяет их то, что все они номинированы в евро.
    bonds:
      name: Токены-облигации
      description: Токены, эмитенты которых обещают их держателям фиксированный профит, например в виде процента за определённое время.
    shares:
      name: Токены-акции
      description: Токены, фиксирующие символические или реальные доли в компаниях или имуществе, а также связанные с этим права и обязанности их держателей.
    time_tokens:
      name: Тайм-токены
      description: Персональные токены, номинированные в часах и фиксирующие обязательство эмитента оказать услугу или выполнить работу на общих или специальных условиях.
    donation:
      name: Токены донатные
      description: Такие токены покупают, чтобы сделать пожертвование. Сами токены при этом чаще всего остаются сувениром.
    nft:
      name: NFT-токены
      description: Так называемые невзаимозаменяемые токены, то есть существующие в единственном числе и привязанные к неделимым объектам.
    mtl_debt:
      name: Казначейские расписки
      description: Служебные токены для учёта и контроля обязательств по хранению конкретных активов.
    rwa:
      name: RWA-токены
      description: Токенизированные активы «реального мира», включая биржевые товары и акции, недвижимость, транспорт и другие материальные объекты.
    other:
      name: Прочие
      description: Токены, настолько оригинальные, что для них пока не нашлось места в других категориях.

