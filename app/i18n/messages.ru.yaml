login:
  description: >
    Сайт предлагает некоторые функции, доступные только для авторизованных пользователей.
    Прежде всего, это удобная записная книжка контактов, совместимая с Sunce Wallet.
    А также верифицированные участники Ассоциации Монтелиберо могут видеть телеграм-юзернеймы других участников.
  no_cookie:
    title: Cookie отключены
    description: >
      Для авторизации на этом сайте нужно сперва включить cookie. Там только сессионная нужна.
      После включения нужно перезагрузить эту страницу.
  step_one:
    title: 1. Сперва нужно подписать
    description: Подпишите транзакцию-пустышку, чтобы подтвердить контроль аккаунта.
    time_limit: "Транзакция актуальна ещё:"
    button: Подписать
  step_two:
    title: 2. Теперь проверить
    description: После того, как успешно подписали транзакцию, нажмите эту кнопу чтобы войти.
    button: Проверить
  again_button: Авторизоваться
  invite_to_manual: >
    Совсем не получается? Если у вас на руках есть секретный ключ, то можно попробовать 
    <a href="/login/manual/">ручной режим авторизазии →</a>

login_manual:
  description: >
    На этой странице можно сделать авторизацию в ручном режиме, лишенном всего удобства магии SEP-07.
    Для этого вам потребуется простой советский секретный ключ от вашего аккаунта. А ещё точнее — легитимная подпись
    транзакции от имени вашего аккаунта. Подойдёт даже для пользователей мультисига.
  instruction: >
    В поле ниже вставляется стеллар адрес, нажимаете «Получить транзакцию». Берёте эту транзакцию, и, например
    в лаборатории Стеллар, добавляете к ней нужные подписи. После чего вставляете итог в поле ниже, и нажимаете 
    «Авторизовать».
  step_one:
    header: Укажите ваш адрес
    account_id: Стеллар аккаунт
    account_id_hint: Под каким аккаунтом вы желаете авторизоваться? Нужно будет корректно подписать транзакцию для него.
    button: Получить транзакцию
  step_two:
    header: Подпишите транзакцию
    xdr: Ваша транзакция
    xdr_hint: Скопируйте и подпишите, например, в Лаборатории Стеллар
    signed_xdr: Подписанная транзакция
    signed_xdr_hint: Вставьте сюда результат подписания транзакции выше
    button: Авторизовать
  errors:
    invalid_account_id: Тут ожидается ваш стеллар адрес, что обычно начниается с G, и состоит из 56 символов
    invalid_signed_xdr: Ошибка в поле подписанной транзакции. Там должна быть эдакая абракадабра, обычно начинающаяся на AAAA...=
    wrong_account_id: Аккаунт в транзакции не совпадает с указанным аккаунтом
    wrong_seq_number: Транзакция устарела, так как с этого аккаунта ушла новая транзакция
    bad_signature: Проблема с подписью. Возможно не хватает голосов, а может подписали неподходящим ключом

