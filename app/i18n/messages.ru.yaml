tokens:
  description: >
    Любой участник токеномики может выпустить какие-нибудь токены. И наполнить их смыслом.
    Ниже представлены разные известные токены, разбитые худо-бедно по категориям.
    Не является инвестиционной рекомендацией :-)
  categories:
    membership:
      name: Токены участия
      description: Эти токены используются для фиксации членства в различных организациях. Обычно у них нет свободного хождения.
    mtl_stables:
      name: Стейблы МТЛ-Фонда
      description: Токены, значение которых привязано к какой-нибудь фиатной (государственной) валюте.
    mtl_wrapped:
      name: Обёрнутые активы от МТЛ-Фонда
      description: Похожи на стейблы, но такие токены привыязываются к другим криптоактивам, обычно из других блокчейнов.
    euro_notes:
      name: Расписки на евро
      description: Эти токены так или иначе тоже номинированы в евро и это их основная функция.
    bonds:
      name: Облигации
      description: Токены, эмитенты которых обещают владельцам заранее определённую выгоду, например процентный доход.
    shares_div:
      name: Акции с дивидендами
      description: Токены, символизирующие обладание доли от чего-либо, и для владельцев которых, похоже, есть дивидендный доход.
    shares_nodiv:
      name: Акции без дивидендов
      description: Токены, что тоже похожи на акции, но дивидендного дохода не обещается, или не наблюдается.
    time_tokens:
      name: Таймтокены
      description: Персональные токены, предлагающие время их эмитента на основе их оферты.
    donation:
      name: Донатные
      description: Такие токены покупают, чтобы сделать пожертвование. Сами токены при этом чаще всего остаются сувениром.
    nft:
      name: NFT
      description: Классические или не очень НФТ. Каждый такой токен существует в единственном числе.
    mtl_debt:
      name: Казначейские долговые
      description: Служебные токены для определения казначейского лимита.
