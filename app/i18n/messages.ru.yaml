tools_multisig:
  name: Мультиподпись
  account: Аккаунт
  intro:
    paragraph_1: Мультиподпись — одна из сильнейших сторон блокчейна Stellar. Она гибко настраивается и меняется в любое время. В то же время, с помощью «поломки» мультиподписи можно окончательно потерять доступ к управлению аккаунтом. Поэтому нужно быть очень осторожным.
    paragraph_2: Эта страница помогает настроить мультиподпись для любого аккаунта, а также проверяет на основные ошибки, чтобы избежать потери доступа. Но всё равно можно случайно усложнить себе жизнь, будьте осторожны.
  current_state:
    title: Ситуация сейчас
    no_multisig: Мультиподпись пока не настроена, аккаунт управляется только своим мастер ключом.
  signers:
    title: Участники мультиподписи
    description: В мультиподписи может быть до 20 участников, у всех индивидуальные веса подписи. На аккаунте замораживается %reserve_xlm% XLM за каждого.
    item_label: Участник %number%
    master_key: Мастер ключ
    signer_help: Стеллар аккаунт и вес его подписи (1-255)
    master_key_help: Вес той подписи, что образуется оригинальным ключем этого аккаунта. Для организаций обычно устанавливают 0, то есть отключают.
  thresholds:
    title: Лимиты
    description: Для того чтобы транзакция была успешно принята блокчейном, нужно чтобы она собрала подписями необходимый лимит. Каждый участник мультиподписи обладает своим весом голоса, они суммируются.
    low:
      label: Лимит для простых операций
      help: "0-255. Лимит для безопасных операций: Bump sequence, Set trustline flags, Claim claimable balance"
    med:
      label: Лимит основных операций
      help: "0-255. Лимит основного блока операций, вроде исходящих платежей"
    high:
      label: Лимит для серьёзных операций
      help: "0-255. Лимит для двух опасных транзакций: обновление мультиподписи и слияния аккаунта в другой"
  signer: Участник
  buttons:
    reset: Сбросить
    calculate: Создать транзакцию
  errors:
    title: Найдены ошибки
    wrong_low_threshold: Лимит для простых операций должен быть обычным числом от 0 до 255
    low_threshold_more_than_med_threshold: Лимит для простых операций не может быть больше лимита для основных
    wrong_med_threshold: Лимит для основных операций должен быть обычным числом от 0 до 255
    med_threshold_more_than_high_threshold: Лимит для основных операций не может быть больше лимита для серьёзных
    wrong_high_threshold: Лимит для серьёзных операций должен быть обычным числом от 0 до 255
    wrong_master_key_weight: Вес мастер-ключа в подписи должен быть числом от 0 (заблокирован) до 255
    missing_signer_account: Указан вес подписи, но нет значения аккаунта
    wrong_signer_account: Аккаунт какой-то не похожий на корректный стеллар-адрес
    wrong_signer_weight: Вес подписи должен быть обычным числом от 0 (удалится) до 255
    doubled_signer_account: Аккаунт повторно упоминается в списке
    impossible_to_collect_signers: Суммы весов всех подписей не хватает для преодоления лимита на серьёзные операции
    no_changes_to_save: Нет изменений для сохранения

tools_timetoken:
  name: Таймтокен
  description: >
    Таймтокен — такой ассет, который символизирует ваш условный час вовлечённого внимания.
    На этой странице можно известить остальных участников токеномики, что вы выпускаете таймтокены.
