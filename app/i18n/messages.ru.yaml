mtla_page:
  title: Ассоциация Монтелиберо
  account: Аккаунт
  website: Сайт

mtla_participants_page:
  title: Участники Ассоциации
  empty_accounts: пока никого не видно
  members_here: "Вот кто тут:"
  intro:
    lead: >
      На этой странице мы показываем участников Ассоциации по данным из кеша BSN: кто есть, какого он уровня участия и в каком именно разделе его место.
    mechanics: >
      Участники бывают персональные и корпоративные. Уровни участия идут строго последовательно: каждый следующий уровень автоматически включает предыдущие, так что статус повыше не отменяет статус пониже, а просто наслаивается сверху.
    agreement_prefix: Текст Соглашения, если хочется сверить формулировки, лежит в
    agreement_link: актуальной версии документа
  personal:
    title: Персональные участники
    intro: >
      Это физические лица. С ними всё более-менее просто: один токен означает присоединение к Соглашению, а дальше идут всё более серьёзные уровни вовлечённости, ответственности и формального доверия.
    stats_title: Краткая статистика
    stats:
      total: "Всего участников МТЛА: %cnt%"
      level_1_only: "Только первый уровень: %cnt%"
      verified: "Верифицированных: %exact% + %higher% = %total%"
      creditworthy: "Кредитоспособных: %exact% + %higher% = %total%"
      activists: "Активистов: %exact% + %higher% = %total%"
      sponsors: "Спонсоров: %cnt%"
    level_1:
      title: Первый уровень
      description: >
        Те, у кого ровно 1 токен MTLAP. Они подписались под нашим Соглашением, но пока не пошли глубже по формальной лестнице участия.
    level_2:
      title: Второй уровень, верифицированные участники
      description: >
        Они так или иначе отказались от полной анонимности и взамен получили голос. А значит, могут участвовать в принятии решений в Собрании, а также избирать и быть избранными в Совет.
      note: "На этом уровне именно %exact% участников, но если считать вместе со всеми уровнями выше, верифицированных уже %total%."
    level_3:
      title: Третий уровень, кредитоспособные
      description: >
        Это не обязательно великие финансовые мудрецы. Критерий тут формальный: либо на счёте есть активов больше чем на 1000 EURMTL, либо выполнены другие условия для получения этого статуса.
      note: "На этом уровне именно %exact% участников, но вместе со всеми уровнями выше статусом кредитоспособности обладают уже %total%."
    level_4:
      title: Четвёртый уровень, активисты
      description: >
        Это тоже формальный статус. Напоминаем честно: он не всегда один к одному совпадает с реальным активизмом, но мы стараемся, чтобы формальная карта постепенно приближалась к реальной реальности.
      note: "На этом уровне именно %exact% участников, но вместе со спонсорами активистов уже %total%."
    level_5:
      title: Пятый уровень, спонсоры
      description: >
        Те, кто ежемесячно переводит немного денюжек на содержание Ассоциации. Наши герои: любим, ценим. Среди их плюшек — доступ в Совет с правом совещательного голоса.
  corporate:
    title: Корпоративные участники
    intro: >
      Это компании, группы и объединения, которые участвуют в жизни Ассоциации уже не как отдельные люди, а как коллективные сущности. По Соглашению у них своя лестница статусов: от просто признанного участника до донора Ассоциации.
    stats_title: Краткая статистика
    stats:
      total: "Всего корпоративных участников МТЛА: %cnt%"
      level_1_only: "Только первый уровень: %cnt%"
      verified: "Верифицированных надёжных контрагентов: %exact% + %higher% = %total%"
      projects: "Исполняющих функции или проекты Ассоциации: %exact% + %higher% = %total%"
      donors: "Корпоративных доноров: %cnt%"
    level_1:
      title: Первый уровень
      description: >
        Это компании, группы или объединения, которые признаны реальными и учтены в статусе корпоративного участника Ассоциации. База уже есть, фундамент залит, можно жить дальше.
    level_2:
      title: Второй уровень, верифицированные надёжные контрагенты
      description: >
        Тут уже не просто «мы о вас знаем», а «мы готовы иметь с вами дело всерьёз». По Соглашению сюда входят прошедшие добровольную сертификацию и дающие гарантии клиентской безопасности и контроля качества.
      note: "На этом уровне именно %exact% корпоративных участников, но вместе со всеми уровнями выше надёжных контрагентов уже %total%."
    level_3:
      title: Третий уровень, исполнители функций и проектов Ассоциации
      description: >
        Эти корпоративные участники не просто существуют рядом, а уже делают что-то полезное в интересах Ассоциации: исполняют функции, тянут инфраструктуру, ведут проекты или помогают держать систему в рабочем состоянии.
      note: "На этом уровне именно %exact% корпоративных участников, но вместе с донорами таких уже %total%."
    level_4:
      title: Четвёртый уровень, доноры Ассоциации
      description: >
        Это значимые корпоративные доноры Ассоциации. Их полномочные представители могут участвовать в работе Совета с правом совещательного голоса, а мы, со своей стороны, смотрим на них с отдельной признательностью.

