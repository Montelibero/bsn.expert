    написанный прописными буквами: NIRO, SOZ, ADUCHI
  tt_issuer: Альтернативный эмитент таймтокена
  tt_issuer_help: G..., Stellar адрес, только если ваши тайм-токены выпускаются с другого аккаунта
  tt_offer: Оферта
  tt_offer_help: Хеш от текста оферты, по которой выпускается ваш таймтокен
