who_are_you:
  title: От имени какого аккаунта?
  switcher_title: Кто вы сейчас?
  intro: >
    Для этого действия сайту нужно знать, от имени какого Stellar-аккаунта вы хотите действовать.
    Если вы вошли на сайт, мы обычно берём аккаунт входа или выбранный вами текущий аккаунт.
    Если вы не вошли, достаточно указать текущий аккаунт здесь.
  safety: >
    Это не даёт сайту права управлять вашим аккаунтом. Мы только используем адрес, чтобы показать уже установленные
    связи и подготовить корректную транзакцию; подписывать её вы будете отдельно и самостоятельно.
  multisig_note: >
    Можно указать личный аккаунт, аккаунт организации или общий аккаунт с мультиподписью.
  form:
    account_label: Stellar-адрес
    account_hint: Адрес начинается с G и состоит из 56 символов.
    submit: Сохранить
    login: Авторизоваться
  switcher:
    account_link: Аккаунт
    any_account_label: "Любой аккаунт:"
    custom_account_label: "Любой другой аккаунт:"
    custom_account_hint: "Стеллар адрес, не обязательно ваш собственный."
    empty_hint: "Для некоторых функций, вроде редактора BSN, нам полезно знать, от имени какого аккаунта вы сейчас на сайте. Это не обязательно должен быть ваш личный аккаунт: для любых изменений всё равно понадобится отдельно подписать транзакцию."
    hide_account: Скрыть из списка

