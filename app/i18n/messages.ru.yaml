    wrong_account: Основный аккаунт какой-то не похожий на корректный стеллар-адрес
    wrong_tt_code: Ошибка в формате кода токена. Это должна быть строка от 1 до 12 символов содержащая только буквы и цифры
    wrong_tt_issuer: Аккаунт-эмитент какой-то не похожий на корректный стеллар-адрес
    wrong_tt_offer: Ошибка в формате хеша офера, это должно быть 64 символа 0-f.

tools_percent_pay:
  description: >
    Этот инструмент полезен для проведения массовой выплаты процентов держателям какого-то определённого токена.
    Программа проходит по списку держателей, и по указанным вами правилам делает транзакцию с переводом.
    Минимальные данные тут, это собственно описание токена, держателям которого получат платёж, ну и процент.
  asset_issuer:
    name: Эмитент токена
    hint: Обычный стеллар адрес, с которого выпускается целевой токен. Начинается с G.
  asset_code:
    name: Код токена
    placeholder: MyToken
    hint: Название токена, от 1 до 12 символов.
  calc_mode:
    name: Режим расчёта
    percent: Выплата по проценту
    amount: Распределить точную сумму
    hint: Можно либо указать процент для каждого держателя, либо точную сумму токенов выплаты, которую нужно распределить между всеми получателями.
  percent:
    name: Процент
    hint: Какой процент от суммы этих токенов будет переведён держателю. От 0.001 до бесконечности.
  amount:
    name: Сумма к распределению
    hint: Точная сумма токенов выплаты, которую нужно распределить пропорционально балансам держателей.
  balance_limit:
    name: Минимальный баланс
    hint: В выборку попадут только держатели, у которых баланс базового токена не меньше этого значения. По-умолчанию 0.
  payer_account:
    name: Аккаунт плательщика
    hint: С какого счета будет уходить оплата. По-умолчанию со счета-эмитента, но можно указать альтернативный.
  payment_token:
    name: Переводить токен
    hint_select: Какой токен получит каждый держатель основного токена.
    hint_free: >
      Какой токен получит каждый держатель основного токена. Формат TokenName-IssuerAddress, 
      например EURMTL-GACKTN5DAZGWXRWB2WLM6OPBDHAMT6SJNGLJZPQMEZBUR4JUGBX2UK7V.
  memo:
    name: Мемо
    placeholder: Платёж держателям токена MyToken
    hint: Примечание к транзакции. Чтобы получатели понимали причину платежа.
  buttons:
    reset: Сбросить
    calculate: Рассчитать
  calculation:
    title: Расчёт
    description: >
      Держатели токена <a href="/tokens/%asset_code%-%asset_issuer%">%asset_code%</a> получат перевод 
      в токенах <a href="/tokens/%payment_token_code%-%payment_token_issuer%">%payment_token_code%</a>.
    account: Аккаунт
    balance: Баланс
    to_pay: К оплате
    to_pay_trustline: По открытым trustline
    sum: Итого
    transaction: Транзакция
    transactions: Транзакции
    instruction_single: >
      Ниже готовая транзакция с платежами, которую осталось подписать и отправить в блокчейн.
    instruction_multi: >
      Так как у вас очень много платежей, то ниже дано несколько транзакций. Их нужно подписывать и отправлять
      в блокчейн строго одну за другой. Главное, не покидайте эту страницу, пока не завершите процесс.
    transaction_no: Транзакция №
    filtered_out: В выборку не попало %quantity% держателей токена на сумму %sum%, так как у каждого баланс меньше указанного лимита %limit%.
    insufficient_balance: "На аккаунте %account% недостаточно токенов %token% для этих выплат: доступно %available%, требуется %required%."
    no_eligible_trustlines: Для выбранного токена выплаты не найдено ни одного получателя с открытой линией доверия, поэтому транзакция раздачи не сформирована.

